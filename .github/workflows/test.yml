name: Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix flake check
      - run: nix run .# -- --version
      - name: Test TypeScript runtime layout
        run: |
          tmpdir=$(mktemp -d)
          printf 'const message: string = "ok"; console.log(message);\n' > "$tmpdir/check.ts"
          test "$(nix run .# -- "$tmpdir/check.ts")" = "ok"
      - run: ./update
        env:
          GH_TOKEN: ${{ github.token }}
